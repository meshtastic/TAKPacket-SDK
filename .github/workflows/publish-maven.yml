name: Publish to Maven Central

# Gated: only runs when manually triggered from the Actions tab.
# Requires repository secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
# SIGNING_KEY_ID, SIGNING_PASSWORD, GPG_KEY_CONTENTS.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish KMP artifacts to Maven Central
    # macOS required for iOS/Apple target artifacts
    runs-on: macOS-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('kotlin/**/*.gradle*', 'kotlin/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests before publishing
        working-directory: kotlin
        run: ./gradlew jvmTest --quiet

      - name: API compatibility check
        working-directory: kotlin
        run: ./gradlew apiCheck --quiet

      - name: Publish to Maven Central
        working-directory: kotlin
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
